<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8e5cf4">
    <title>HearMe2nite - 오프라인</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at 20% 12%, rgba(244, 95, 154, .28), transparent 32%),
                radial-gradient(circle at 80% 20%, rgba(124, 92, 255, .32), transparent 34%),
                linear-gradient(145deg, #151827, #241b31 58%, #101623);
        }
        main {
            width: min(420px, 100%);
            padding: 30px 24px;
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 28px;
            background: rgba(32, 34, 52, .72);
            box-shadow: 0 22px 70px rgba(0, 0, 0, .32);
            text-align: center;
        }
        .mark {
            width: 74px;
            height: 74px;
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            border-radius: 24px;
            background: linear-gradient(135deg, #f45f9a, #7c5cff);
            font-size: 2.1rem;
        }
        h1 { margin: 0 0 10px; font-size: 1.55rem; }
        p { margin: 0; color: rgba(255,255,255,.76); line-height: 1.65; font-weight: 700; }
        button {
            margin-top: 22px;
            width: 100%;
            min-height: 48px;
            border: 0;
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f45f9a, #7c5cff);
        }
    </style>
</head>
<body>
    <main>
        <div class="mark">♥</div>
        <h1>잠시 연결이 끊겼어요</h1>
        <p>HearMe2nite 앱 화면은 준비되어 있어요.<br>인터넷 연결 후 다시 열면 기록을 불러올 수 있습니다.</p>
        <button type="button" onclick="location.reload()">다시 연결하기</button>
    </main>
</body>
</html>
